max:
  bot:
    token: ${MAX_BOT_TOKEN}
    mode: POLLING
    polling:
      enabled: true
      limit: 100
      timeout: 30s
      types:
        - message_created
        - message_callback

demo:
  smoke:
    destructive: ${DEMO_SMOKE_DESTRUCTIVE:false}
    webhook-url: ${DEMO_SMOKE_WEBHOOK_URL:}

logging:
  level:
    ru.tardyon.botframework: DEBUG
