services:
  redis:
    image: redis:7.4-alpine
    container_name: max-demo-redis
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis_demo_data:/data
    restart: unless-stopped

volumes:
  redis_demo_data:
