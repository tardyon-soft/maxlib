image: eclipse-temurin:21-jdk

stages:
  - build
  - test
  - publish

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8"

cache:
  key: "gradle-${CI_PROJECT_ID}"
  paths:
    - .gradle/wrapper/
    - .gradle/caches/

before_script:
  - chmod +x ./gradlew

build:
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "master"'
  script:
    - ./gradlew --no-daemon --stacktrace clean assemble

unit_tests:
  stage: test
  needs: ["build"]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "master"'
  script:
    - ./gradlew --no-daemon --stacktrace test
  artifacts:
    when: always
    reports:
      junit:
        - "**/build/test-results/test/*.xml"
    paths:
      - "**/build/reports/tests/test/**"

publish_maven_central:
  stage: publish
  needs: ["unit_tests"]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "master"'
  when: manual
  allow_failure: false
  script:
    - test -n "$MAVEN_CENTRAL_USERNAME" || (echo "MAVEN_CENTRAL_USERNAME is required" && exit 1)
    - test -n "$MAVEN_CENTRAL_PASSWORD" || (echo "MAVEN_CENTRAL_PASSWORD is required" && exit 1)
    - test -n "$MAVEN_GPG_PRIVATE_KEY" || (echo "MAVEN_GPG_PRIVATE_KEY is required" && exit 1)
    - test -n "$MAVEN_GPG_PASSPHRASE" || (echo "MAVEN_GPG_PASSPHRASE is required" && exit 1)
    - ./gradlew --no-daemon --stacktrace publishVanillaJavaToMavenCentral publishStarterToMavenCentral
